<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow - My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark" style="background-color: #e74c3c;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/index">🎬 BookMyShow</a>
            <div>
                <span class="text-white me-3">Hello, {{ session.name }}!</span>
                <a href="/my_bookings" class="btn btn-outline-light btn-sm me-2">My Bookings</a>
                <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4">

                    <div class="text-center mb-4">
                        <div style="font-size: 60px;">👤</div>
                        <h4 class="mt-2">My Profile</h4>
                    </div>

                    {% if success %}
                    <div class="alert alert-success">{{ success }}</div>
                    {% endif %}

                    <!-- VIEW DETAILS -->
                    <div class="mb-4">
                        <p><strong>Name:</strong> {{ user.name }}</p>
                        <p><strong>Email:</strong> {{ user.email }}</p>
                        <p><strong>Phone:</strong> {{ user.phone }}</p>
                        <p><strong>Member Since:</strong> {{ user.created_at }}</p>
                    </div>

                    <hr>

                    <!-- EDIT PHONE -->
                    <h6 class="mb-3">Update Phone Number</h6>
                    <form action="/profile" method="POST" onsubmit="return validatePhone()">
                        <div class="mb-3">
                            <label class="form-label">New Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text">+91</span>
                                <input type="text" name="phone" id="phone" 
                                       class="form-control" maxlength="10" 
                                       placeholder="10 digit number" required>
                            </div>
                            <div class="invalid-feedback" id="phone-error"></div>
                        </div>
                        <button type="submit" class="btn btn-danger w-100">
                            Update Phone
                        </button>
                    </form>

                    <hr>

                    <a href="/index" class="btn btn-outline-secondary w-100">
                        Back to Movies
                    </a>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function validatePhone() {
            const phone = document.getElementById('phone');
            const phoneRegex = /^[6-9]\d{9}$/;
            if (!phoneRegex.test(phone.value)) {
                phone.classList.add('is-invalid');
                document.getElementById('phone-error').textContent = 
                    'Enter a valid 10 digit Indian mobile number.';
                return false;
            }
            phone.classList.remove('is-invalid');
            return true;
        }
    </script>

</body>
</html>
