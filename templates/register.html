<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<script>
function validateForm() {
    let valid = true;

    // Email validation
    const email = document.getElementById('email');
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email.value)) {
        email.classList.add('is-invalid');
        document.getElementById('email-error').textContent = 'Please enter a valid email address.';
        valid = false;
    } else {
        email.classList.remove('is-invalid');
    }

    // Password validation
    const password = document.getElementById('password');
    const passRegex = /^(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,}$/;
    if (!passRegex.test(password.value)) {
        password.classList.add('is-invalid');
        document.getElementById('password-error').textContent = 
            'Password must be at least 8 characters with 1 uppercase, 1 number, and 1 special character.';
        valid = false;
    } else {
        password.classList.remove('is-invalid');
    }

    // Phone validation
    const phone = document.getElementById('phone');
    const phoneRegex = /^[6-9]\d{9}$/;
    if (!phoneRegex.test(phone.value)) {
        phone.classList.add('is-invalid');
        document.getElementById('phone-error').textContent = 
            'Enter a valid 10-digit Indian mobile number.';
        valid = false;
    } else {
        phone.classList.remove('is-invalid');
    }

    return valid;
}
</script>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="text-center mb-4" style="color: #e74c3c;">🎬 BookMyShow</h2>

        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow p-4">

                    <h4 class="mb-3">Create Account</h4>

                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form action="/register" method="POST" onsubmit="return validateForm()">

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" id="email" required>
                            <div class="invalid-feedback" id="email-error"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text">+91</span>
                                <input type="text" name="phone" id="phone" class="form-control" maxlength="10" placeholder="10 digit number" required>
                            </div>
                            <div class="invalid-feedback" id="phone-number-error"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" id="password" class="form-control" required>
                            <small class="text-muted">Min 8 chars,atleast 1 uppercase;1 number;1 special char</small>
                            <div class="invalid-feedback" id="password-error"></div>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Register</button>

                    </form>

                    <hr>

                    <p class="text-center mb-0">
                        Already have an account?
                        <a href="/login">Login here</a>
                    </p>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
